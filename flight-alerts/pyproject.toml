[tool.ruff]
line-length = 100
target-version = "py310"
extend-exclude = ["venv"]

[tool.ruff.lint]
select = ["E", "F", "W", "I", "B", "UP", "SIM"]

[tool.ruff.format]
quote-style = "double"

[tool.bandit]
exclude_dirs = ["venv", ".git"]
# B101: asserts (unused). B112: try_except_continue (we log + skip per-route).
skips = ["B101", "B112"]
